---
site:
  title: OpenShift Observability Workshop
  url: https://github.com/cldmnky/observability-workshop
  start_page: modules::index.adoc

content:
  sources:
    - url: /showroom/repo
      start_path: showroom/content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v0.0.1/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./showroom/content/supplemental-ui
    - path: ./showroom/content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
    - require: ./showroom/content/lib/compute-attributes.js
    - require: ./showroom/content/lib/dev-mode.js
      enabled: false

output:
  dir: ./www
