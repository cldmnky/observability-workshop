---
# Allows Perses to perform TokenReview and SubjectAccessReview for Kubernetes authn/authz.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: perses-dev-k8s-authn-authz
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]

---
# Grants all authenticated OCP users read access to Perses resources
# checked via SubjectAccessReview by the Kubernetes authorization provider.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: perses-dev-viewer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["perses.dev"]
    resources:
      - globaldatasources
      - globalsecrets
      - globalvariables
      - globalroles
      - globalrolebindings
      - projects
      - folders
      - dashboards
      - datasources
      - variables
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-dev-k8s-authn-authz
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: perses-sa
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: perses-dev-k8s-authn-authz

---
# Bind viewer role to all authenticated OCP users.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-dev-viewer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:authenticated
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: perses-dev-viewer

---
# Allows the Perses SA to query COO Prometheus and Thanos endpoints.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-dev-monitoring-view
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: perses-sa
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view

---
# Allows the Perses SA to read application logs via the LokiStack gateway.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-dev-logging-view
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: perses-sa
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-application-view
