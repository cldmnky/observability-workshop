---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: perses-dev
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: perses-dev
  serviceName: perses-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: perses-dev
    spec:
      serviceAccountName: perses-sa
      containers:
        - name: perses
          image: {{ .Values.image.perses }}
          args:
            - --config=/etc/perses/config/config.yaml
            - --log.level=info
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/perses/config
              readOnly: true
            - name: provisioning
              mountPath: /etc/perses/provisioning
              readOnly: true
            - name: service-ca
              mountPath: /etc/perses/service-ca
              readOnly: true
            - name: data
              mountPath: /perses
            - name: plugins
              mountPath: /etc/perses/plugins
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources: {{ toYaml .Values.resources.perses | nindent 12 }}
        - name: oauth-proxy
          image: {{ .Values.image.oauthProxy }}
          args:
            - --https-address=:8443
            - --http-address=
            - --provider=openshift
            - --openshift-service-account=perses-sa
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/oauth/cookie-secret
            - --pass-user-bearer-token=true
            - --scope=user:info
            - --cookie-expire=8h
          ports:
            - containerPort: 8443
              name: oauth-proxy
          volumeMounts:
            - name: perses-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: perses-oauth-cookie
              mountPath: /etc/oauth
              readOnly: true
          resources: {{ toYaml .Values.resources.oauthProxy | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: perses-config
        - name: provisioning
          configMap:
            name: perses-provisioning
        - name: service-ca
          configMap:
            name: perses-service-ca
        - name: data
          persistentVolumeClaim:
            claimName: perses-data
        - name: plugins
          emptyDir: {}
        - name: perses-tls
          secret:
            secretName: perses-tls
        - name: perses-oauth-cookie
          secret:
            secretName: perses-oauth-proxy-cookie
            items:
              - key: cookie-secret
                path: cookie-secret
