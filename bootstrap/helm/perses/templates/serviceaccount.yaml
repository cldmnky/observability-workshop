---
# ServiceAccount used by the Perses pod and datasource proxy.
# Registered as an OAuthClient via the redirect reference annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses-sa
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    serviceaccounts.openshift.io/oauth-redirectreference.perses: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"perses-dev"}}
