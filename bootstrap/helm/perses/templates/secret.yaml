---
# Cookie secret for the oauth-proxy sidecar (16/24/32 bytes AES).
# Override oauthCookieSecret in values.yaml or via --set for production.
apiVersion: v1
kind: Secret
metadata:
  name: perses-oauth-proxy-cookie
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
data:
  cookie-secret: {{ .Values.oauthCookieSecret }}
