---
# Web Terminal Operator Subscription
# Installs to openshift-operators (global AllNamespaces mode)
# No OperatorGroup needed — openshift-operators already has a global one
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: web-terminal
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  channel: {{ .Values.operator.channel }}
  installPlanApproval: {{ .Values.operator.installPlanApproval }}
  name: web-terminal
  source: redhat-operators
  sourceNamespace: openshift-marketplace
