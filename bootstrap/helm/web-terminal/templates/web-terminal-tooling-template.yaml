---
# WebTerminalTooling DevWorkspaceTemplate
# Configures the default web terminal image and persistent home storage.
# The OpenShift console recognises any DevWorkspace with:
#   labels:   console.openshift.io/terminal: 'true'
# Users launch the terminal via the ">_" icon in the OCP Console.
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspaceTemplate
metadata:
  name: web-terminal-tooling
  namespace: openshift-operators
  annotations:
    controller.devfile.io/allow-import-from: '*'
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    console.openshift.io/terminal: 'true'
spec:
  attributes:
    controller.devfile.io/storage-type: per-workspace
  components:
    - name: web-terminal-tooling
      container:
        image: {{ .Values.image }}
        args:
          - tail
          - '-f'
          - /dev/null
        cpuLimit: 400m
        cpuRequest: 100m
        memoryLimit: 512Mi
        memoryRequest: 128Mi
        mountSources: false
        sourceMapping: /projects
        volumeMounts:
          - name: home-storage
            path: /home/user
    - name: home-storage
      volume:
        ephemeral: false
