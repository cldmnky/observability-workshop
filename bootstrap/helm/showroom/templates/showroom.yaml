{{- if .Values.showroom.enabled }}
---
# Showroom Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.showroom.namespace | default "showroom" }}
  labels:
    demo.redhat.com/application: "showroom"
---
# Showroom ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
{{- if .Values.oauthProxy.enabled }}
# Showroom OAuth Proxy ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.showroom.name }}-oauth
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.showroom: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"{{ .Values.showroom.name }}"}}
---
# Showroom OAuth Cookie Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.showroom.name }}-oauth-cookie-secret
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $existing := lookup "v1" "Secret" .Values.showroom.namespace (printf "%s-oauth-cookie-secret" .Values.showroom.name) }}
  {{- if $existing }}
  cookie-secret: {{ index $existing.data "cookie-secret" }}
  {{- else }}
  cookie-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
# Showroom RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-{{ .Values.showroom.name }}-sa
  namespace: {{ .Values.showroom.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom Nginx ConfigMap
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-proxy-config
  namespace: {{ .Values.showroom.namespace }}
apiVersion: v1
data:
  nginx.conf: |
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;
      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }
      server {
        listen 8080;
        absolute_redirect off;
        location / {
          proxy_pass http://127.0.0.1:8000;
          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "gzip";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- if .Values.showroom.terminal.enabled }}
        location /terminal/ {
          proxy_pass http://127.0.0.1:7681;
          rewrite ^/terminal/(.*)$ /$1 break;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
        {{- end }}
        location = /api/user-info {
          default_type application/json;
          return 200 '{"user":"$http_x_auth_request_user","console_url":"https://console-openshift-console.{{ .Values.deployer.domain }}","api_url":"{{ .Values.deployer.apiUrl }}","login_command":"oc login --server={{ .Values.deployer.apiUrl }}","openshift_cluster_ingress_domain":"{{ .Values.deployer.domain }}","perses_url":"https://perses.{{ .Values.deployer.domain }}"}';
        }
      }
    }
---
# Showroom User Data ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-userdata
  namespace: {{ .Values.showroom.namespace }}
data:
  user_data.yml: |
    cluster_domain: {{ .Values.deployer.domain }}
    openshift_cluster_ingress_domain: {{ .Values.deployer.domain }}
    {{- if .Values.deployer.domain }}
    openshift_cluster_console_url: https://console-openshift-console.{{ .Values.deployer.domain }}
    {{- end }}
    guid: {{ .Values.showroom.namespace }}
    {{- if .Values.deployer.apiUrl }}
    openshift_api_url: {{ .Values.deployer.apiUrl }}
    {{- end }}
    {{- if .Values.deployer.domain }}
    perses_url: https://perses.{{ .Values.deployer.domain }}
    {{- end }}
    demo_namespace: {{ .Values.demo.namespace }}
    demo_app: {{ .Values.demo.appName }}
---
# Showroom PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.showroom.name }}-terminal-lab-user-home
  namespace: {{ .Values.showroom.namespace }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: "5Gi"
---
# Showroom Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  {{- if .Values.oauthProxy.enabled }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.showroom.name }}-tls
  {{- end }}
spec:
  type: ClusterIP
  ports:
  {{- if .Values.oauthProxy.enabled }}
  - name: oauth-proxy
    port: 8443
    protocol: TCP
    targetPort: 8443
  {{- else }}
  - port: 8080
    protocol: TCP
    targetPort: 8080
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
---
# Showroom Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  labels:
    demo.redhat.com/application: "showroom"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.showroom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.showroom.name }}
    spec:
      serviceAccountName: {{ if .Values.oauthProxy.enabled }}{{ .Values.showroom.name }}-oauth{{ else }}{{ .Values.showroom.name }}{{ end }}
      initContainers:
      - name: git-cloner
        image: "quay.io/rhpds/git-cloner:v1.1.2"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: CLONE_DIR
          value: "/showroom/repo"
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
      - name: link-content
        image: "registry.access.redhat.com/ubi9/ubi-minimal:latest"
        command: ["/bin/sh", "-c"]
        args:
          - |
            ln -sf /showroom/repo/showroom/content /showroom/repo/content
            ln -sf /showroom/repo/showroom/site.yml /showroom/repo/site.yml
            ln -sf /showroom/repo/showroom/ui-config.yml /showroom/repo/ui-config.yml
            echo "Symlinks created"
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
      - name: antora-builder
        image: "quay.io/rhpds/antora:v1.0.1"
        env:
        - name: FILES_DIR
          value: "/showroom/repo"
        - name: OUTPUT_DIR
          value: "/showroom/www"
        - name: ANTORA_SITE_FILE
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
      containers:
      - name: nginx
        image: "quay.io/rhpds/nginx:1.25"
        imagePullPolicy: "IfNotPresent"
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /var/cache/nginx
          name: nginx-cache
        - mountPath: /var/run
          name: nginx-pid
        ports:
        - name: web
          containerPort: 8080
      - name: content
        image: {{ .Values.showroom.content.image | quote }}
        imagePullPolicy: "IfNotPresent"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: ANTORA_PLAYBOOK
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        - name: DOMAIN
          value: {{ .Values.deployer.domain | quote }}
        {{- if .Values.showroom.nookbag.enabled }}
        - name: ZT_BUNDLE
          value: {{ .Values.showroom.nookbag.bundleUrl | quote }}
        - name: ZT_UI_ENABLED
          value: "true"
        - name: GUID
          value: {{ .Values.showroom.namespace | quote }}
        {{- end }}
        volumeMounts:
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        ports:
        - containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8000
        readinessProbe:
          httpGet:
            path: /
            port: 8000
      {{- if .Values.oauthProxy.enabled }}
      - name: oauth-proxy
        image: {{ .Values.oauthProxy.image | quote }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: oauth-proxy
          containerPort: 8443
        args:
        - --https-address=:8443
        - --provider=openshift
        - --openshift-service-account={{ .Values.showroom.name }}-oauth
        - --upstream=http://localhost:8080
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret-file=/etc/proxy/secrets/cookie-secret
        - --pass-access-token=true
        - --pass-user-bearer-token=true
        - --pass-basic-auth=false
        - --pass-user-headers=true
        volumeMounts:
        - mountPath: /etc/tls/private
          name: oauth-tls
        - mountPath: /etc/proxy/secrets
          name: oauth-cookie-secret
        resources:
          limits:
            cpu: {{ .Values.oauthProxy.resources.limits.cpu }}
            memory: {{ .Values.oauthProxy.resources.limits.memory }}
          requests:
            cpu: {{ .Values.oauthProxy.resources.requests.cpu }}
            memory: {{ .Values.oauthProxy.resources.requests.memory }}
      {{- end }}
      {{- if .Values.showroom.terminal.enabled }}
      - name: terminal
        image: {{ .Values.showroom.terminal.image | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- if .Values.deployer.apiUrl }}
        - name: OCP_API_URL
          value: {{ .Values.deployer.apiUrl | quote }}
        {{- end }}
        - name: KUBECONFIG
          value: /home/lab-user/.kube/config
        volumeMounts:
        - name: terminal-lab-user-home
          mountPath: /home/lab-user
        ports:
        - containerPort: 7681
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.showroom.terminal.resources.limits.cpu }}
            memory: {{ .Values.showroom.terminal.resources.limits.memory }}
          requests:
            cpu: {{ .Values.showroom.terminal.resources.requests.cpu }}
            memory: {{ .Values.showroom.terminal.resources.requests.memory }}
      {{- end }}
      volumes:
      - name: showroom-files
        emptyDir: {}
      - name: user-data
        configMap:
          name: {{ .Values.showroom.name }}-userdata
      - name: nginx-config
        configMap:
          defaultMode: 420
          name: {{ .Values.showroom.name }}-proxy-config
      - name: nginx-pid
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: terminal-lab-user-home
        persistentVolumeClaim:
          claimName: {{ .Values.showroom.name }}-terminal-lab-user-home
      {{- if .Values.oauthProxy.enabled }}
      - name: oauth-tls
        secret:
          secretName: {{ .Values.showroom.name }}-tls
      - name: oauth-cookie-secret
        secret:
          secretName: {{ .Values.showroom.name }}-oauth-cookie-secret
      {{- end }}
---
# Showroom Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    haproxy.router.openshift.io/timeout-tunnel: 1h
spec:
  {{- if and .Values.route.hostPrefix .Values.deployer.domain }}
  host: {{ .Values.route.hostPrefix }}.{{ .Values.deployer.domain }}
  {{- end }}
  to:
    kind: Service
    name: {{ .Values.showroom.name }}
  port:
  {{- if .Values.oauthProxy.enabled }}
    targetPort: oauth-proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  {{- else }}
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
  wildcardPolicy: None
{{- end }}
