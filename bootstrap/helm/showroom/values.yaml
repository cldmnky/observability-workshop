# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom-workshop
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/cldmnky/observability-workshop.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  # Nookbag bundle (enables LlamaStack, multiple terminals, Zero Trust UI)
  nookbag:
    enabled: true
    bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.3.2/nookbag-v0.3.2.zip"

  # Terminal configuration
  terminal:
    enabled: false
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

# OAuth proxy
oauthProxy:
  enabled: true
  image: "quay.io/openshift/origin-oauth-proxy:4.15"
  resources:
    limits:
      cpu: "100m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"

# Injected by parent chart
deployer:
  domain: ""
  apiUrl: ""

# Injected by applicationset (routeHostPrefix)
route:
  hostPrefix: ""

# Used by userdata ConfigMap
demo:
  namespace: ""
  appName: ""
