# Wave 4 — PersesGlobalDatasource resources for Loki and Tempo.
# These are cluster-scoped and accessible from all projects.
#
# Both use the OpenShift Route hostnames rather than internal ClusterIP
# services.  The COO Perses proxy (v1.25) only verifies TLS certificates
# against the system trust store, so we route through the OpenShift
# ingress — which uses the wildcard ingress certificate trusted by default.
#
# Authentication is handled by the COO Perses instance's kubernetesAuth
# (perses-sa SA token), which we granted loki/tempo tenant read access
# via ClusterRoleBindings in perses-rbac.yaml.
#
# SkipDryRunOnMissingResource because these CRDs are installed by the COO
# operator and may not yet exist on the first sync.
---
apiVersion: perses.dev/v1alpha2
kind: PersesGlobalDatasource
metadata:
  name: loki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    default: false
    display:
      name: "Loki"
      description: "LokiStack application logs (openshift-logging)"
    plugin:
      kind: LokiDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'https://{{ .Values.persesDatasources.loki.routeHost }}/api/logs/v1/application'
            headers:
              X-Scope-OrgID: application
            allowedEndpoints:
              - endpointPattern: /loki/api/v1/query
                method: POST
              - endpointPattern: /loki/api/v1/query
                method: GET
              - endpointPattern: /loki/api/v1/query_range
                method: POST
              - endpointPattern: /loki/api/v1/query_range
                method: GET
              - endpointPattern: /loki/api/v1/labels
                method: GET
              - endpointPattern: /loki/api/v1/label/([a-zA-Z0-9_-]+)/values
                method: GET
              - endpointPattern: /loki/api/v1/series
                method: POST
              - endpointPattern: /loki/api/v1/series
                method: GET
              - endpointPattern: /loki/api/v1/tail
                method: GET
---
apiVersion: perses.dev/v1alpha2
kind: PersesGlobalDatasource
metadata:
  name: tempo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    default: false
    display:
      name: "Tempo"
      description: "TempoStack distributed tracing backend"
    plugin:
      kind: TempoDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'https://{{ .Values.persesDatasources.tempo.routeHost }}/api/traces/v1/dev/tempo'
            headers:
              X-Scope-OrgID: dev
            allowedEndpoints:
              - endpointPattern: /api/echo
                method: GET
              - endpointPattern: /api/search
                method: GET
              - endpointPattern: /api/search/tags
                method: GET
              - endpointPattern: /api/search/tag/.+/values
                method: GET
              - endpointPattern: /api/traces/.+
                method: GET
              - endpointPattern: /api/v2/search/tags
                method: GET
              - endpointPattern: /api/v2/search/tag/.+/values
                method: GET