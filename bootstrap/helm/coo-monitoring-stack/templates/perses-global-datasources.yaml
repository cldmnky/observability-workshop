# Wave 4 — Perses datasources for Loki and Tempo.
#
# Loki: namespaced PersesDatasource in openshift-logging, matching the
#        official Red Hat Developer blog pattern.  Uses loki-datasource-secret
#        for bearer-token auth with the LokiStack application tenant.
# Tempo: cluster-scoped PersesGlobalDatasource accessible from all projects
#        via the Tempo query-frontend HTTP API.
#
# Both use service-ca TLS via the CA cert at /ca/service-ca.crt (mounted
# from the openshift-service-ca.crt ConfigMap by the Perses operator).
#
# SkipDryRunOnMissingResource because these CRDs are installed by the COO
# operator and may not yet exist on the first sync.
---
apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: loki
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    default: false
    display:
      name: "Loki"
      description: "LokiStack application logs (openshift-logging)"
    plugin:
      kind: LokiDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            # URL pattern for LokiStack openshift-logging tenancy:
            # Perses appends /loki/api/v1/... for queries
            url: 'https://logging-loki-gateway-http.openshift-logging.svc.cluster.local:8080/api/logs/v1/application'
            headers:
              X-Scope-OrgID: application
            secret: loki-datasource-secret
            allowedEndpoints:
              - endpointPattern: /loki/api/v1/query
                method: POST
              - endpointPattern: /loki/api/v1/query
                method: GET
              - endpointPattern: /loki/api/v1/query_range
                method: POST
              - endpointPattern: /loki/api/v1/query_range
                method: GET
              - endpointPattern: /loki/api/v1/labels
                method: GET
              - endpointPattern: /loki/api/v1/label/([a-zA-Z0-9_-]+)/values
                method: GET
              - endpointPattern: /loki/api/v1/series
                method: POST
              - endpointPattern: /loki/api/v1/series
                method: GET
              - endpointPattern: /loki/api/v1/tail
                method: GET
  client:
    tls:
      enable: true
      caCert:
        type: file
        certPath: /ca/service-ca.crt
---
apiVersion: perses.dev/v1alpha2
kind: PersesGlobalDatasource
metadata:
  name: tempo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    default: false
    display:
      name: "Tempo"
      description: "TempoStack distributed tracing backend"
    plugin:
      kind: TempoDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'https://tempo-tempo-query-frontend.openshift-tempo-operator.svc.cluster.local:3200'
            allowedEndpoints:
              - endpointPattern: /api/echo
                method: GET
              - endpointPattern: /api/search
                method: GET
              - endpointPattern: /api/search/tags
                method: GET
              - endpointPattern: /api/search/tag/.+/values
                method: GET
              - endpointPattern: /api/traces/.+
                method: GET
              - endpointPattern: /api/v2/search/tags
                method: GET
              - endpointPattern: /api/v2/search/tag/.+/values
                method: GET
  client:
    tls:
      enable: true
      caCert:
        type: file
        certPath: /ca/service-ca.crt