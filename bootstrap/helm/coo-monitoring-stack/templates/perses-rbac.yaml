# Wave 2 — Grant the COO Perses ServiceAccount read access to the cluster-wide
# LokiStack application tenant and TempoStack dev/prod tenants.
#
# The Perses proxy (openshift-operators/perses-sa) uses these ClusterRoles to
# pass SubjectAccessReview checks at the Loki/Tempo gateways when querying on
# behalf of users.  Without these bindings, Perses datasources receive 403.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-sa-loki-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-application-view
subjects:
- kind: ServiceAccount
  name: perses-sa
  namespace: openshift-operators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-sa-tempo-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader
subjects:
- kind: ServiceAccount
  name: perses-sa
  namespace: openshift-operators
