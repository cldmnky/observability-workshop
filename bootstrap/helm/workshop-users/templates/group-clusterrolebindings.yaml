# Wave 2 — ClusterRoleBindings granting the workshop-users group access to
# cluster-scoped resources (e.g., PersesGlobalDatasource).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.clusterRoles.persesViewer.name }}-group
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.clusterRoles.persesViewer.name }}
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: {{ .Values.group.name }}
