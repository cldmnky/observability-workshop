# Wave 4 — monitoring API RoleBindings in shared monitoring/observability namespaces.
# Allows the workshop-users group to query Prometheus and Alertmanager APIs.
{{- range $.Values.monitoringApiNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Values.clusterRoles.monitoringApi.name }}
  namespace: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Values.clusterRoles.monitoringApi.name }}
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: {{ $.Values.group.name }}
{{- end }}
