# Wave 3 — ServiceAccount + ClusterRoleBinding for the OTel collector sidecar.
# Only needed in the observability-demo namespace (Module 4 tracing exercise).
{{- range $v := until (int .Values.users.count) }}
{{- $user := printf "%s%d" $.Values.users.prefix (add $v 1) }}
{{- $ns := printf "%s-observability-demo" $user }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-sidecar
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-sidecar-{{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Values.clusterRoles.otelCollector.name }}
subjects:
- kind: ServiceAccount
  name: otel-collector-sidecar
  namespace: {{ $ns }}
{{- end }}
