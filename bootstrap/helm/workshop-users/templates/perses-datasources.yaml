# Wave 4 — Pre-create PersesDatasources in each user namespace pointing at the
# shared COO MonitoringStack Prometheus, LokiStack, and Tempo distributed tracing
# backend.  Marking prometheus default=true means Perses dashboards in the same
# namespace pick it up without an explicit datasource ref.
#
# SkipDryRunOnMissingResource is required because the perses.dev CRDs are
# installed by the COO operator; they may not yet exist on the first ArgoCD sync.
{{- range $v := until (int .Values.users.count) }}
{{- $user := printf "%s%d" $.Values.users.prefix (add $v 1) }}
{{- range $.Values.exerciseNamespaceSuffixes }}
{{- $ns := printf "%s-%s" $user . }}
---
apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    monitoring.rhobs/stack: observability-stack
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    default: true
    display:
      name: "COO Prometheus"
      description: "COO MonitoringStack Prometheus in observability-demo"
    plugin:
      kind: PrometheusDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'http://observability-stack-prometheus.observability-demo.svc.cluster.local:9090'
---
apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: loki
  namespace: {{ $ns }}
  labels:
    monitoring.rhobs/stack: observability-stack
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    display:
      name: "Loki"
      description: "LokiStack application logs (openshift-logging)"
    plugin:
      kind: LokiDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'https://logging-loki-gateway-http.openshift-logging.svc.cluster.local:8080/api/logs/v1/application'
            secret:
              name: ocp-sa-bearer
            allowedEndpoints:
              - endpointPattern: /loki/api/v1/query
                method: POST
              - endpointPattern: /loki/api/v1/query
                method: GET
              - endpointPattern: /loki/api/v1/query_range
                method: POST
              - endpointPattern: /loki/api/v1/query_range
                method: GET
              - endpointPattern: /loki/api/v1/labels
                method: GET
              - endpointPattern: /loki/api/v1/label/([a-zA-Z0-9_-]+)/values
                method: GET
              - endpointPattern: /loki/api/v1/series
                method: POST
              - endpointPattern: /loki/api/v1/series
                method: GET
              - endpointPattern: /loki/api/v1/tail
                method: GET
---
apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: tempo
  namespace: {{ $ns }}
  labels:
    monitoring.rhobs/stack: observability-stack
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  config:
    display:
      name: "Tempo"
      description: "TempoStack distributed tracing backend"
    plugin:
      kind: TempoDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: 'https://tempo-tempo-query-frontend.openshift-tempo-operator.svc.cluster.local:3200'
            secret:
              name: ocp-sa-bearer
            allowedEndpoints:
              - endpointPattern: /api/echo
                method: GET
              - endpointPattern: /api/search
                method: GET
              - endpointPattern: /api/search/tags
                method: GET
              - endpointPattern: /api/search/tag/.+/values
                method: GET
              - endpointPattern: /api/traces/.+
                method: GET
              - endpointPattern: /api/v2/search/tags
                method: GET
              - endpointPattern: /api/v2/search/tag/.+/values
                method: GET
{{- end }}
{{- end }}
