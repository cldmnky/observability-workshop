# Wave 1 — ClusterRoles created by this chart
# applicationLogs and lokiRules are provided by the logging operator; they are
# only referenced (not created) in the RoleBinding templates below.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.clusterRoles.monitoring.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["monitoring.coreos.com"]
  resources: ["servicemonitors", "prometheusrules", "podmonitors"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.clusterRoles.monitoringApi.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["monitoring.coreos.com"]
  resources: ["prometheuses", "alertmanagers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["monitoring.coreos.com"]
  resources: ["prometheuses/api", "alertmanagers/api"]
  verbs: ["get"]
---
# Read-only access to Cluster Observability Operator (COO) resources.
# Allows workshop users to inspect MonitoringStack, ThanosRuler, etc.
# in shared namespaces such as observability-demo.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.clusterRoles.cooViewer.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["monitoring.rhobs"]
  resources: ["monitoringstacks", "thanosrulers", "alertmanagers"]
  verbs: ["get", "list", "watch"]
---
# Read-only access to cluster-scoped Perses resources (GlobalDatasource).
# PersesGlobalDatasource is cluster-scoped so a ClusterRole is required.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.clusterRoles.persesViewer.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["perses.dev"]
  resources: ["persesglobaldatasources"]
  verbs: ["get", "list", "watch"]
