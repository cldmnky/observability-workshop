name: modules
title: OpenShift Observability Workshop
version: master
nav:
  - modules/ROOT/nav.adoc

asciidoc:
  attributes:
    lab_name: "openshift-observability-workshop"
    release-version: master
    page-pagination: true
    # Environment
    guid: "%guid%"
    # OpenShift Cluster Access
    OPENSHIFT_USERNAME: "%OPENSHIFT_USERNAME%"
    OPENSHIFT_PASSWORD: "%OPENSHIFT_PASSWORD%"
    openshift_api_url: "%openshift_api_url%"
    openshift_cluster_console_url: "%openshift_cluster_console_url%"
    openshift_console_url: "%openshift_cluster_console_url%"
    openshift_cluster_ingress_domain: "%openshift_cluster_ingress_domain%"
    perses_url: "%perses_url%"
    page-links:
    - url: "%openshift_cluster_console_url%"
      text: OCP Console
    - url: "%openshift_cluster_console_url%/terminal"
      text: Web Terminal
    - url: https://redhat.com
      text: Red Hat

antora:
  extensions:
    - require: ./lib/dev-mode.js
      enabled: false
    - require: ./lib/preserve-url-params-extension.js
